body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#2d1150;min-height:100vh;display:flex;align-items:center;justify-content:center}

function b64a(b){var s=atob(b),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a}
function unlock(pw){
var enc=new TextEncoder(),dec=new TextDecoder(),s=b64a(SALT),iv=b64a(IV),d=b64a(DATA);
return crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey'])
.then(function(km){return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:600000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt'])})
.then(function(k){return crypto.subtle.decrypt({name:'AES-GCM',iv:iv},k,d)})
.then(function(r){return dec.decode(r)});
}
document.getElementById('fm').onsubmit=function(){
var p=document.getElementById('pw').value;
if(!p)return false;
document.getElementById('btn').style.display='none';
document.getElementById('sp').style.display='block';
document.getElementById('err').style.display='none';
setTimeout(function(){
unlock(p).then(function(html){
document.open();document.write(html);document.close();
}).catch(function(){
document.getElementById('btn').style.display='block';
document.getElementById('sp').style.display='none';
document.getElementById('err').style.display='block';
document.getElementById('pw').value='';
});
},100);
return false;
};
