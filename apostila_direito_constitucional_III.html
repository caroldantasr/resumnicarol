document.getElementById('fm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const password = document.getElementById('pw').value;
  
  document.getElementById('sp').style.display = 'block';
  document.getElementById('btn').disabled = true;
  
  setTimeout(() => {
    try {
      const parts = encryptedPayload.split(':');
      const salt = new Uint8Array(parts[0].match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
      const iv = new Uint8Array(parts[1].match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
      const authTag = new Uint8Array(parts[2].match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
      const encrypted = new Uint8Array(parts[3].match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
      
      // Derive key
      const encoder = new TextEncoder();
      const passwordBytes = encoder.encode(password);
      
      // PBKDF2 in WebCrypto
      crypto.subtle.importKey('raw', passwordBytes, 'PBKDF2', false, ['deriveBits'])
        .then(key => crypto.subtle.deriveBits({name: 'PBKDF2', salt: salt, iterations: 600000, hash: 'SHA-256'}, key, 256))
        .then(derivedBits => {
          const derivedKey = new Uint8Array(derivedBits);
          
          // AES-GCM decryption
          return crypto.subtle.importKey('raw', derivedKey, 'AES-GCM', false, ['decrypt'])
            .then(importedKey => crypto.subtle.decrypt({name: 'AES-GCM', iv: iv, additionalData: null, tagLength: 128}, importedKey, new Uint8Array([...encrypted, ...authTag])))
            .then(decrypted => {
              const decoder = new TextDecoder();
              const html = decoder.decode(decrypted);
              document.open();
              document.write(html);
              document.close();
            });
        })
        .catch(() => {
          document.getElementById('sp').style.display = 'none';
          document.getElementById('btn').disabled = false;
          document.getElementById('err').style.display = 'block';
