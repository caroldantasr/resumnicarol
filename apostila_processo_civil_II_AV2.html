document.getElementById('fm').onsubmit=function(){
var p=document.getElementById('pw').value;
if(!p)return;
document.getElementById('sp').style.display='block';
document.getElementById('err').style.display='none';
setTimeout(function(){try{
var s=Uint8Array.from(atob(SALT),c=>c.charCodeAt(0));
var i=Uint8Array.from(atob(IV),c=>c.charCodeAt(0));
var e=Uint8Array.from(atob(CT),c=>c.charCodeAt(0));
crypto.subtle.importKey('raw',new TextEncoder().encode(p),{name:'PBKDF2'},false,['deriveKey']).then(function(k){
crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:100000,hash:'SHA-256'},k,{name:'AES-CBC',length:256},false,['decrypt']).then(function(dk){
crypto.subtle.decrypt({name:'AES-CBC',iv:i},dk,e).then(function(d){
var t=new TextDecoder().decode(d);
document.open();document.write(t);document.close();
}).catch(function(){document.getElementById('sp').style.display='none';document.getElementById('err').style.display='block';});
});});
}catch(x){document.getElementById('sp').style.display='none';document.getElementById('err').style.display='block';}},300);
};
